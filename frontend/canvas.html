<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lupo · Coordination Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#17151C; --surface:#221F2A; --raised:#2B2734; --line:#39333F;
    --text:#ECE7F0; --muted:#948BA6;
    --rose:#E0A3B4;   /* human / taste */
    --amber:#E8B15A;  /* escalation */
    --mint:#86C7A6;   /* deal / decision */
    --blue:#8FB3E0;   /* task / message */
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ink);color:var(--text);
    font-family:Inter,system-ui,sans-serif;line-height:1.45}
  .wrap{max-width:1100px;margin:0 auto;padding:28px 22px 60px}
  header{display:flex;justify-content:space-between;align-items:flex-end;
    gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:18px}
  h1{font-family:Fraunces,serif;font-weight:600;font-size:30px;margin:0;letter-spacing:.3px}
  h1 small{font-family:Inter;font-weight:500;color:var(--muted);font-size:13px;
    display:block;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
  .mission{color:var(--muted);font-size:14px;max-width:48ch;margin-top:6px}
  /* budget ring */
  .budget{display:flex;align-items:center;gap:14px}
  .ring{--p:0;width:78px;height:78px;border-radius:50%;
    background:conic-gradient(var(--mint) calc(var(--p)*1%), var(--line) 0);
    display:grid;place-items:center;transition:--p .6s ease}
  .ring i{width:60px;height:60px;border-radius:50%;background:var(--surface);
    display:grid;place-items:center;font-family:Fraunces;font-size:18px;font-style:normal}
  .budget .lab{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
  .grid{display:grid;grid-template-columns:230px 1fr;gap:22px;margin-top:24px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}
  /* org roster */
  .panel-label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:0 0 12px}
  .node{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);
    border-radius:12px;margin-bottom:8px;background:var(--surface);transition:.25s;opacity:.62}
  .node .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex:none}
  .node b{font-family:Fraunces;font-weight:600;font-size:15px}
  .node span{font-size:11px;color:var(--muted);display:block}
  .node.active{opacity:1;border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),0 6px 22px #0006;transform:translateX(3px)}
  .node.human.active{border-color:var(--rose);box-shadow:0 0 0 1px var(--rose),0 0 26px #e0a3b455}
  .node.active .dot{background:var(--blue)}
  .node.human.active .dot{background:var(--rose)}
  /* feed */
  .feed{border:1px solid var(--line);border-radius:14px;background:var(--surface);
    padding:8px;min-height:340px;max-height:440px;overflow:auto}
  .ev{display:grid;grid-template-columns:84px 1fr;gap:12px;padding:9px 10px;border-radius:9px;
    font-size:13.5px;animation:in .35s ease}
  .ev+.ev{border-top:1px solid #2c2733}
  .ev .who{font-family:JetBrains Mono,monospace;font-size:11px;color:var(--muted);
    text-align:right;padding-top:2px}
  .ev .body{font-family:JetBrains Mono,monospace;font-size:12.5px}
  .ev.escalation .body{color:var(--amber)} .ev.human_reply .body{color:var(--rose)}
  .ev.deal .body, .ev.decision .body{color:var(--mint)}
  .ev.negotiation .body{color:var(--text)} .ev.budget .body{color:var(--blue)}
  .ev .k{display:inline-block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink);background:var(--muted);border-radius:4px;padding:1px 6px;margin-right:7px}
  .ev.escalation .k{background:var(--amber)} .ev.human_reply .k{background:var(--rose)}
  .ev.deal .k,.ev.decision .k{background:var(--mint)} .ev.budget .k{background:var(--blue)}
  @keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .cards{margin-top:6px;display:flex;flex-direction:column;gap:5px}
  .card{border:1px solid #39333F;border-radius:8px;padding:6px 9px;display:flex;gap:9px;align-items:flex-start}
  .thumb{width:44px;height:58px;border-radius:6px;background:#17151C;flex:none;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover}
  .cbody{flex:1;min-width:0}
  .cr{display:flex;justify-content:space-between;gap:8px}
  .cti{font-family:Inter;font-weight:500;font-size:12.5px}
  .cp{font-family:JetBrains Mono;font-size:11.5px;color:var(--muted)}
  .cd{font-size:12px;color:var(--muted);margin:2px 0}.clg{color:#6E6680}
  .ctags{display:flex;gap:4px;flex-wrap:wrap}
  .ct{font-size:10px;background:#17151C;color:var(--muted);border-radius:4px;padding:1px 6px}
  .ct.best{background:var(--mint);color:#17151C}.ct.warn{background:var(--amber);color:#17151C}
  /* outfit */
  .outfit{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .tile{border:1px dashed var(--line);border-radius:12px;padding:12px 14px;min-width:140px;opacity:.4;transition:.4s}
  .tile.filled{opacity:1;border-style:solid;border-color:var(--mint)}
  .tile .c{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
  .tile .t{font-family:Fraunces;font-size:15px;margin:3px 0}
  .tile .p{font-family:JetBrains Mono;font-size:13px;color:var(--mint)}
  .controls{display:flex;gap:10px;margin-top:18px;align-items:center}
  button{font-family:Inter;font-weight:600;font-size:13px;color:var(--ink);background:var(--rose);
    border:0;border-radius:9px;padding:9px 16px;cursor:pointer}
  button.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .hint{color:var(--muted);font-size:12px}
  .scn{display:flex;gap:8px;margin:0 0 16px;flex-wrap:wrap}
  .scn button{font-family:inherit;font-size:13px;font-weight:500;color:var(--text);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:8px 13px;cursor:pointer}
  .scn button.on{border-color:var(--rose);color:var(--rose);box-shadow:0 0 0 1px var(--rose)}
  .scn button.live{border-color:var(--mint);color:var(--mint)}
  /* fal outfit preview hero */
  .preview{margin:0 0 14px;border:1px solid var(--line);border-radius:14px;overflow:hidden;
    background:var(--surface);display:none}
  .preview.show{display:block;animation:in .5s ease}
  .preview img{display:block;width:100%;max-height:340px;object-fit:cover}
  .preview .cap{padding:8px 12px;font-size:12px;color:var(--muted);
    display:flex;justify-content:space-between;gap:10px;align-items:center}
  .preview .cap .regen{color:var(--rose);font-weight:600;opacity:0;transition:.3s}
  .preview.regen .cap .regen{opacity:1}
  /* live human prompt panel */
  .prompt{margin-top:16px;border:1px solid var(--rose);border-radius:14px;background:#2A2230;
    padding:14px 16px;display:none;box-shadow:0 0 28px #e0a3b433}
  .prompt.show{display:block;animation:in .35s ease}
  .prompt .q{font-family:Fraunces;font-size:16px;margin-bottom:10px}
  .prompt .q::before{content:"📲 ";}
  .prompt .opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .prompt .opts button{background:var(--rose);color:var(--ink)}
  .prompt .row{display:flex;gap:8px}
  .prompt input{flex:1;background:var(--ink);border:1px solid var(--line);border-radius:9px;
    color:var(--text);padding:9px 12px;font-family:Inter;font-size:13px}
  .prompt .row button{background:transparent;color:var(--text);border:1px solid var(--line)}
  @keyframes buzz{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}
    40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
  .node.buzz{animation:buzz .4s ease infinite;border-color:var(--rose)!important;
    box-shadow:0 0 0 1px var(--rose),0 0 30px #e0a3b4aa!important;opacity:1!important}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1><small>Lupo · coordination layer</small>Personal-shopper mission</h1>
      <div class="mission" id="mission">Loading mission…</div>
    </div>
    <div class="budget">
      <div class="lab">budget<br>used</div>
      <div class="ring" id="ring"><i id="ringval">€0</i></div>
    </div>
  </header>

  <div class="scn">
    <button data-s="brunch" class="on">Brunch · €60 · negotiate</button>
    <button data-s="tomorrowland">Tomorrowland · €80 · reallocate</button>
    <button data-s="live">Replay ↻</button>
    <button id="runlive" class="live">● Run live (server)</button>
  </div>

  <div class="grid">
    <div>
      <p class="panel-label">The org</p>
      <div id="roster"></div>
    </div>
    <div>
      <div class="preview" id="preview">
        <img id="previewimg" src="" alt="outfit preview">
        <div class="cap"><span id="previewcap">Outfit preview</span><span class="regen">regenerating…</span></div>
      </div>
      <p class="panel-label">Coordination stream</p>
      <div class="feed" id="feed"></div>
      <div class="prompt" id="prompt">
        <div class="q" id="promptq"></div>
        <div class="opts" id="promptopts"></div>
        <div class="row"><input id="promptinput" placeholder="…or type an amendment / reply" />
          <button id="promptsend">Send</button></div>
      </div>
      <div class="outfit" id="outfit"></div>
      <div class="controls">
        <button id="play">▶ Play mission</button>
        <button id="step" class="ghost">Step</button>
        <button id="reset" class="ghost">Restart</button>
        <span class="hint" id="hint">Pick a scenario · “Run live (server)” drives the real coordinator</span>
      </div>
    </div>
    <audio id="voice" autoplay></audio>
  </div>
</div>

<script>
const ROLES = [
  ["coordinator","Coordinator","routes · escalates · arbitrates"],
  ["stylist","Stylist","brief → outfit spec"],
  ["buyer","Buyer","searches Vinted"],
  ["procurement","Procurement","owns the budget"],
  ["negotiator","Negotiator","haggles sellers"],
  ["seller","Seller","simulated counterparty"],
  ["human","You (exec)","taste · approvals"],
];
// Embedded fallback so the canvas works on double-click (file://, no server).
const EMBEDDED = [
{"seq":1,"kind":"task","actor":"coordinator","text":"Mission: 'Sunday brunch with the girls — cute but comfy' within €60"},
{"seq":2,"kind":"message","actor":"stylist","text":"Vision: cream/sage/gold — dress, shoes, bag, jewellery"},
{"seq":3,"kind":"escalation","actor":"coordinator","text":"ASK human: approve the vision?"},
{"seq":4,"kind":"human_reply","actor":"human","text":"amend: ballet flats instead of sandals, and a small shoulder bag"},
{"seq":5,"kind":"decision","actor":"stylist","text":"Amended shoes: sandals → ballet flats"},
{"seq":6,"kind":"decision","actor":"stylist","text":"Amended bag: tote → small shoulder bag"},
{"seq":7,"kind":"budget","actor":"procurement","text":"Allocations: dress €24, shoes €17, bag €12, jewellery €7"},
{"seq":8,"kind":"escalation","actor":"coordinator","text":"ASK human: approve the budget split?"},
{"seq":9,"kind":"human_reply","actor":"human","text":"approve"},
{"seq":10,"kind":"candidates","actor":"buyer","text":"dress: ranked 3 finds","candidates":[
  {"title":"Zara floral midi casual dress","price":32,"size":"M","lang":"fr","desc":"Robe midi fleurie en coton, style bohème, taille normale","attrs":["cotton","boho","true-to-size"],"fit":94,"best":true},
  {"title":"H&M cream sundress","price":18,"size":"M","lang":"nl","desc":"Lichte zomerjurk, katoen, valt klein","attrs":["cotton","fits-small"],"fit":60,"best":false},
  {"title":"Mango midi floral","price":24,"size":"S","lang":"it","desc":"vestito midi a fiori, nuovo con cartellino","attrs":[],"fit":40,"best":false,"source":"gemini-escalation"}]},
{"seq":11,"kind":"escalation","actor":"coordinator","text":"dress is €32 — €8 over its €24 budget. Raiding other categories risks the rest of the look."},
{"seq":12,"kind":"human_reply","actor":"human","text":"negotiate"},
{"seq":13,"kind":"negotiation","actor":"negotiator","text":"open €24 (ask €32, target €28)"},
{"seq":14,"kind":"negotiation","actor":"seller","text":"counter €29"},
{"seq":15,"kind":"negotiation","actor":"negotiator","text":"raise to €26"},
{"seq":16,"kind":"deal","actor":"negotiator","text":"DEAL at €26 (saved €6)"},
{"seq":17,"kind":"decision","actor":"coordinator","text":"Acquire dress: 'Zara floral midi casual dress' @ €26 | remaining €34"},
{"seq":18,"kind":"message","actor":"buyer","text":"shoes: pick 'Tan ballet flats leather' €14 (fit 100%)"},
{"seq":19,"kind":"decision","actor":"coordinator","text":"Acquire shoes: 'Tan ballet flats leather' @ €14 | remaining €20"},
{"seq":20,"kind":"message","actor":"buyer","text":"bag: pick 'Mini summer shoulder bag' €10 (fit 80%)"},
{"seq":21,"kind":"decision","actor":"coordinator","text":"Acquire bag: 'Mini summer shoulder bag' @ €10 | remaining €10"},
{"seq":22,"kind":"message","actor":"buyer","text":"jewellery: pick 'Gold dainty hoops earrings' €8 (fit 100%)"},
{"seq":23,"kind":"budget","actor":"procurement","text":"Absorbed €1 overspend on jewellery from slack"},
{"seq":24,"kind":"decision","actor":"coordinator","text":"Acquire jewellery: 'Gold dainty hoops earrings' @ €8 | remaining €2"},
{"seq":25,"kind":"decision","actor":"coordinator","text":"Outfit: 4/4 items, total €58 / €60"},
{"seq":26,"kind":"escalation","actor":"coordinator","text":"CONFIRM purchase (spends money)"},
{"seq":27,"kind":"human_reply","actor":"human","text":"confirm"},
{"seq":28,"kind":"deal","actor":"coordinator","text":"Purchase confirmed"},
{"seq":29,"kind":"message","actor":"coordinator","text":"Paid online — dress, shoes, bag and hoops ship from France & the Netherlands. Orders placed; tracking to follow. Nothing to pick up."}
];
const EMBEDDED_TOMORROWLAND = [
{"seq":1,"kind":"task","actor":"coordinator","text":"Mission: 'Tomorrowland mainstage, Saturday night — bold, rave-ready' within €80"},
{"seq":2,"kind":"message","actor":"stylist","text":"Vision: neon/black/holographic — top, bottoms, accessories, boots"},
{"seq":3,"kind":"escalation","actor":"coordinator","text":"ASK human: approve the vision?"},
{"seq":4,"kind":"human_reply","actor":"human","text":"make it a mesh top and add some sparkle"},
{"seq":5,"kind":"decision","actor":"stylist","text":"Amended top: plain → mesh + sparkle"},
{"seq":6,"kind":"budget","actor":"procurement","text":"Allocations: top €20, bottoms €24, accessories €12, boots €24"},
{"seq":7,"kind":"escalation","actor":"coordinator","text":"ASK human: approve the budget split?"},
{"seq":8,"kind":"human_reply","actor":"human","text":"approve"},
{"seq":9,"kind":"message","actor":"buyer","text":"top: pick 'Mesh sparkle crop top' €15 (fit 76%)"},
{"seq":10,"kind":"decision","actor":"coordinator","text":"Acquire top: 'Mesh sparkle crop top' @ €15 | remaining €65"},
{"seq":11,"kind":"message","actor":"buyer","text":"bottoms: pick 'Cargo techno pants black' €18 (fit 76%)"},
{"seq":12,"kind":"decision","actor":"coordinator","text":"Acquire bottoms: 'Cargo techno pants black' @ €18 | remaining €47"},
{"seq":13,"kind":"message","actor":"buyer","text":"accessories: pick 'Holographic sunglasses rave' €6 (fit 76%)"},
{"seq":14,"kind":"decision","actor":"coordinator","text":"Acquire accessories: 'Holographic sunglasses rave' @ €6 | remaining €41"},
{"seq":15,"kind":"candidates","actor":"buyer","text":"boots: ranked 2 finds","candidates":[
  {"title":"Buffalo platform chunky boots","price":40,"size":"39","lang":"de","country":"Germany","desc":"Plateaustiefel, robust, Kunstleder","attrs":["platform","chunky"],"fit":88,"best":true,"source":"gemini-escalation"},
  {"title":"Black platform boots","price":28,"size":"39","lang":"nl","country":"Netherlands","desc":"zwarte plateau laarzen","attrs":["platform"],"fit":60,"best":false}]},
{"seq":16,"kind":"escalation","actor":"coordinator","text":"boots are €40 — €16 over their €24 budget, and the hero of the look. Negotiate, or stretch?"},
{"seq":17,"kind":"human_reply","actor":"human","text":"stretch"},
{"seq":18,"kind":"budget","actor":"procurement","text":"Reallocated €16 from other categories → boots (total stays €80)"},
{"seq":19,"kind":"decision","actor":"coordinator","text":"Acquire boots: 'Buffalo platform chunky boots' @ €40 | remaining €1"},
{"seq":20,"kind":"decision","actor":"coordinator","text":"Outfit: 4/4 items, total €79 / €80"},
{"seq":21,"kind":"escalation","actor":"coordinator","text":"CONFIRM purchase (spends money)"},
{"seq":22,"kind":"human_reply","actor":"human","text":"confirm"},
{"seq":23,"kind":"deal","actor":"coordinator","text":"Purchase confirmed"},
{"seq":24,"kind":"message","actor":"coordinator","text":"Paid online — top from France, bottoms from the Netherlands, accessories from Italy will ship. Tracking to follow."},
{"seq":25,"kind":"message","actor":"coordinator","text":"The boots seller is local in Munich. For those: U3/U6 to Universität, bring €40 cash, tap to send the pickup message I drafted. Everything else ships."}
];
const SCEN = {
  brunch:{cap:60, slots:["dress","shoes","bag","jewellery"], events:EMBEDDED,
    mission:"“Sunday brunch with the girls — cute but comfy.” Budget €60. The org styles it, escalates to you, and negotiates the over-budget dress down."},
  tomorrowland:{cap:80, slots:["top","bottoms","accessories","boots"], events:EMBEDDED_TOMORROWLAND,
    mission:"“Tomorrowland mainstage — bold, rave-ready.” Budget €80. The hero boots blow the budget, so on ‘stretch’ procurement reallocates from other categories."},
};
const roster=document.getElementById('roster'), feed=document.getElementById('feed'),
      outfit=document.getElementById('outfit'), ring=document.getElementById('ring'),
      ringval=document.getElementById('ringval'), mission=document.getElementById('mission');
const nodeEls={};
// Build every node with the DOM API instead of innerHTML. Listing titles,
// descriptions and seller country are UNTRUSTED (a prompt-injection / XSS
// vector); textContent neutralises any markup they may contain.
function el(tag, cls, text){ const e=document.createElement(tag);
  if(cls) e.className=cls; if(text!=null) e.textContent=text; return e; }
ROLES.forEach(([id,name,desc])=>{
  const n=el('div','node '+id);
  n.appendChild(el('div','dot'));
  const wrap=el('div'); wrap.appendChild(el('b',null,name)); wrap.appendChild(el('span',null,desc));
  n.appendChild(wrap);
  roster.appendChild(n); nodeEls[id]=n;
});
let CUR="brunch", DATA=SCEN.brunch.events, i=0, timer=null;
function buildOutfit(){
  outfit.innerHTML='';
  SCEN[CUR].slots.forEach(c=>{const t=el('div','tile'); t.id='tile-'+c;
    t.appendChild(el('div','c',c)); t.appendChild(el('div','t','—')); t.appendChild(el('div','p'));
    outfit.appendChild(t);});
}
function actorKey(a){return a&&a.startsWith('seller')?'seller':a;}
function setActive(a){Object.values(nodeEls).forEach(n=>n.classList.remove('active'));
  const k=actorKey(a); if(nodeEls[k])nodeEls[k].classList.add('active');}
function setBudget(used){const p=Math.min(100,used/SCEN[CUR].cap*100);
  ring.style.setProperty('--p',p); ringval.textContent='€'+used;}
function safeUrl(u){ u=String(u||''); return /^https?:\/\//i.test(u)?u:''; }
function buildCards(cands){
  const wrap=el('div','cards');
  cands.forEach(o=>{
    const card=el('div','card');
    const thumb=el('div','thumb');
    const u=safeUrl(o.photo);
    if(u){ const img=document.createElement('img'); img.src=u; img.alt='';
      img.onerror=function(){ this.style.display='none'; }; thumb.appendChild(img); }
    card.appendChild(thumb);
    const cbody=el('div','cbody');
    const cr=el('div','cr');
    cr.appendChild(el('span','cti',o.title));
    cr.appendChild(el('span','cp','€'+o.price+' · '+o.size));
    cbody.appendChild(cr);
    const cd=el('div','cd');
    cd.appendChild(document.createTextNode('“'+(o.desc==null?'':o.desc)+'” '));
    cd.appendChild(el('span','clg','['+o.lang+']'));
    cbody.appendChild(cd);
    const ctags=el('div','ctags');
    (o.attrs||[]).forEach(a=>ctags.appendChild(el('span','ct',a)));
    if(o.source==='gemini-escalation') ctags.appendChild(el('span','ct warn','GLiNER unsure → Gemini'));
    if(o.country) ctags.appendChild(el('span','ct',o.country));
    if(o.best) ctags.appendChild(el('span','ct best','best fit '+o.fit+'%'));
    cbody.appendChild(ctags);
    card.appendChild(cbody);
    wrap.appendChild(card);
  });
  return wrap;
}
const preview=document.getElementById('preview'), previewimg=document.getElementById('previewimg'),
      previewcap=document.getElementById('previewcap'), promptEl=document.getElementById('prompt'),
      promptq=document.getElementById('promptq'), promptopts=document.getElementById('promptopts'),
      promptinput=document.getElementById('promptinput'), voice=document.getElementById('voice'),
      hint=document.getElementById('hint');
function showPreview(url,caption){
  if(!url) return;
  preview.classList.add('show','regen');
  const img=new Image();
  img.onload=()=>{ previewimg.src=url; previewcap.textContent=caption||'Outfit preview'; preview.classList.remove('regen'); };
  img.onerror=()=>{ preview.classList.remove('regen'); };
  img.src=url;
}
function render(ev){
  if(ev.kind==='preview'){ showPreview(ev.image, ev.text||'Outfit preview'); return; }
  setActive(ev.actor);
  const row=el('div','ev '+ev.kind);
  row.appendChild(el('div','who',ev.actor));
  const body=el('div','body');
  if(ev.kind==='candidates' && ev.candidates){
    body.appendChild(el('span','k','finds'));
    if(ev.text) body.appendChild(document.createTextNode(ev.text));
    body.appendChild(buildCards(ev.candidates));
  } else {
    body.appendChild(el('span','k',ev.kind.replace('_',' ')));
    if(ev.text) body.appendChild(document.createTextNode(ev.text));
  }
  row.appendChild(body);
  feed.appendChild(row); feed.scrollTop=feed.scrollHeight;
  const m=/Acquire (\w+):\s*'([^']+)'\s*@\s*€(\d+)/.exec(ev.text||'');
  if(m){const t=document.getElementById('tile-'+m[1]); if(t){t.classList.add('filled');
    t.querySelector('.t').textContent=m[2]; t.querySelector('.p').textContent='€'+m[3];}}
  const rem=/remaining €(\d+)/.exec(ev.text||''); if(rem)setBudget(SCEN[CUR].cap-parseInt(rem[1]));
  if(/Outfit: /.test(ev.text||'')){const s=/total €(\d+)/.exec(ev.text); if(s)setBudget(parseInt(s[1]));}
}
function step(){ if(i>=DATA.length)return stop(); render(DATA[i++]); }
function play(){ if(timer)return; document.getElementById('play').textContent='⏸ Playing…';
  timer=setInterval(()=>{ if(i>=DATA.length)stop(); else step(); },820); }
function stop(){ clearInterval(timer); timer=null; document.getElementById('play').textContent='▶ Play mission'; setActive(null); }
function reset(){ stop(); i=0; feed.innerHTML=''; buildOutfit(); setBudget(0);
  mission.textContent=SCEN[CUR].mission; }
function loadScenario(name){ CUR=name; DATA=SCEN[name].events; reset();
  document.querySelectorAll('.scn button').forEach(b=>b.classList.toggle('on', b.dataset.s===name)); }

document.getElementById('play').onclick=play;
document.getElementById('step').onclick=()=>{stop();step();};
document.getElementById('reset').onclick=reset;
document.querySelectorAll('.scn button').forEach(b=>{
  b.onclick=()=>{
    if(b.dataset.s==='live'){
      fetch('../data/events.jsonl').then(r=>r.ok?r.text():Promise.reject()).then(t=>{
        const rows=t.trim().split('\n').map(JSON.parse);
        const capM=rows.map(e=>/within €(\d+)/.exec(e.text||'')).filter(Boolean).pop();
        const slots=[]; rows.forEach(e=>{const m=/Acquire (\w+):/.exec(e.text||''); if(m&&!slots.includes(m[1]))slots.push(m[1]);});
        SCEN.live={cap:capM?parseInt(capM[1]):60, slots:slots, events:rows, mission:'Live replay of the last real run (data/events.jsonl).'};
        loadScenario('live');
      }).catch(()=>{ mission.textContent='No data/events.jsonl found — run scripts/run_mission.py and serve this folder (python3 -m http.server).'; });
    } else loadScenario(b.dataset.s);
  };
});
// ---- Live mode: drive the real coordinator over SSE -----------------------
let LAST_PLAYABLE='brunch', es=null;
function buzz(on){ const h=nodeEls['human']; if(h) h.classList.toggle('buzz', on); }
function playAudio(url){ if(!url) return; voice.src=url; voice.play().catch(()=>{}); }
function hidePrompt(){ promptEl.classList.remove('show'); promptopts.innerHTML=''; promptinput.value=''; buzz(false); }
function respond(answer){ hidePrompt();
  fetch('/respond',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({answer})}).catch(()=>{}); }
function showPrompt(msg){
  promptq.textContent=msg.question;
  promptopts.innerHTML='';
  (msg.options||[]).forEach(o=>{ const b=document.createElement('button');
    b.textContent=o; b.onclick=()=>respond(o); promptopts.appendChild(b); });
  promptEl.classList.add('show'); buzz(true); playAudio(msg.audio_url);
  setActive('human'); promptinput.focus();
}
promptinput.addEventListener('keydown',e=>{ if(e.key==='Enter'&&promptinput.value.trim()) respond(promptinput.value.trim()); });
document.getElementById('promptsend').onclick=()=>{ if(promptinput.value.trim()) respond(promptinput.value.trim()); };

function runLive(){
  const scn=LAST_PLAYABLE;
  CUR='live'; SCEN.live={cap:SCEN[scn].cap, slots:SCEN[scn].slots, events:[],
    mission:SCEN[scn].mission.replace(/^/,'LIVE · ')};
  DATA=[]; reset(); hidePrompt(); preview.classList.remove('show');
  document.querySelectorAll('.scn button[data-s]').forEach(b=>b.classList.remove('on'));
  if(es){ es.close(); es=null; }
  hint.textContent='Connecting to the coordinator…';
  fetch('/run',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({scenario:scn})})
    .then(r=>r.json()).then(()=>{ hint.textContent='Live: respond on the panel when the coordinator pings you.'; })
    .catch(()=>{ hint.textContent='No server — start it with: python -m lupo.server'; });
  es=new EventSource('/stream');
  es.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='event') render(msg);
    else if(msg.type==='prompt') showPrompt(msg);
    else if(msg.type==='instruct'){ render({kind:'message',actor:'coordinator',text:msg.message}); playAudio(msg.audio_url); }
    else if(msg.type==='done'){ hint.textContent='Mission complete.'; if(es){es.close();es=null;} setActive(null); }
  };
  es.onerror=()=>{ hint.textContent='Stream closed (start the server with python -m lupo.server).'; };
}
document.getElementById('runlive').onclick=runLive;

const _origLoad=loadScenario;
loadScenario=function(name){ if(name==='brunch'||name==='tomorrowland') LAST_PLAYABLE=name;
  if(es){ es.close(); es=null; } _origLoad(name); };
loadScenario('brunch');
</script>
